<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvy & Christine Wedding</title>
<style>
    :root {
        --navy: #001f3f;
        --navy-dark: #001226;
        --gold: #cfa07d;
        --bg-cream: #f4f1ee;
    }

    body {
        font-family: 'Georgia', serif;
        margin: 0;
        background: var(--bg-cream);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow-y: auto;
        padding: 40px 0;
    }

    #landing {
        text-align: center;
        width: 100%;
        max-width: 600px;
    }

    /* 1. Envelope Container */
    #envelope-wrapper {
        position: relative;
        width: 350px;
        height: 230px;
        margin: 0 auto 50px;
        cursor: pointer;
        perspective: 1500px;
    }

    #envelope {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 100%;
        background: var(--navy);
        border-radius: 4px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        z-index: 10; /* Base envelope layer */
    }

    #flap {
        position: absolute;
        top: 0; left: 0;
        width: 0; height: 0;
        border-left: 175px solid transparent;
        border-right: 175px solid transparent;
        border-top: 130px solid var(--navy-dark);
        z-index: 20;
        transform-origin: top;
        transition: transform 0.7s ease-in-out;
    }

    #wax-seal {
        position: absolute;
        top: 100px; left: 50%;
        transform: translateX(-50%);
        width: 50px; height: 50px;
        background: #d4a5a5;
        border-radius: 50%;
        z-index: 25;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        display: flex; justify-content: center; align-items: center;
        color: white; font-weight: bold;
        transition: opacity 0.4s;
    }

    /* 2. The Cards (Resting ABOVE the envelope) */
    .card-container {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        display: flex;
        justify-content: center;
        gap: -10px; /* Slight overlap */
        z-index: 5; /* Initially behind */
        opacity: 0;
        transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.6s, z-index 0s 0.5s;
    }

    .card {
        width: 180px;
        height: 260px;
        border-radius: 2px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        padding: 20px;
        box-sizing: border-box;
    }

    #card-left {
        background: var(--navy);
        color: white;
        transform: rotate(-4deg);
    }

    #card-right {
        background: white;
        border: 1px solid #ddd;
        color: #333;
        transform: rotate(3deg);
    }

    /* Card Content Styling */
    .card h3 { font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 30px; }
    .card h2 { font-style: italic; font-size: 1.5rem; margin: 10px 0; }
    .date-num { font-size: 2.2rem; margin: 5px 0; font-weight: bold; }
    .month-line { border-top: 1px solid #ccc; border-bottom: 1px solid #ccc; padding: 5px 0; margin: 10px 0; }

    /* OPEN STATE ANIMATIONS */
    #envelope-wrapper.open #flap {
        transform: rotateX(180deg);
        z-index: 2; /* Move flap behind cards */
    }

    #envelope-wrapper.open #wax-seal { opacity: 0; }

    #envelope-wrapper.open .card-container {
        opacity: 1;
        /* Pulls the cards DOWN to sit on the envelope body */
        transform: translateX(-50%) translateY(100px); 
        z-index: 30; /* Bring to very front */
    }

    /* 3. Form Section */
    #formContainer {
        display: none; opacity: 0;
        margin-top: 180px; /* Space for the cards to rest */
        transition: opacity 1s;
    }

    .input-group {
        display: flex;
        justify-content: center;
        gap: 5px;
        max-width: 350px;
        margin: 20px auto;
    }

    input { padding: 12px; border: 1px solid #ccc; flex: 1; }
    .btn-check { background: var(--navy); color: white; border: none; padding: 0 20px; cursor: pointer; }
    .proceed-btn { display: inline-block; margin-top: 15px; padding: 12px 30px; background: var(--gold); color: white; text-decoration: none; border-radius: 4px; font-weight: bold; font-family: sans-serif; }
</style>
</head>
<body>

<div id="landing">
    <div id="envelope-wrapper" onclick="openEnvelope()">
        <div id="flap"></div>
        <div id="wax-seal">H&C</div>
        <div id="envelope"></div>

        <div class="card-container">
            <div class="card" id="card-left">
                <h3>INTRODUCING</h3>
                <br>
                <h2>Harvy &<br>Christine</h2>
            </div>
            <div class="card" id="card-right">
                <p style="font-size: 0.8rem;">THE WEDDING DAY</p>
                <div class="date-num">12</div>
                <div class="month-line">June 2026</div>
                <p style="font-size: 0.65rem; line-height: 1.5;">
                    AT 3:30 PM<br>
                    GRAND RECEPTION HALL<br>
                    CITY GARDENS
                </p>
            </div>
        </div>
    </div>

    <div id="formContainer">
        <p>Please enter your name for the guest list:</p>
        <div class="input-group">
            <input type="text" id="guestName" placeholder="Full Name">
            <button class="btn-check" onclick="checkGuest()">Check</button>
        </div>
        <div id="message"></div>
    </div>
</div>

<script>
    const guests = {
        "John Doe": 2,
        "Jane Smith": 1,
        "Harvy": "Unlimited",
        "Christine": "Unlimited"
    };

    function openEnvelope() {
        const wrapper = document.getElementById('envelope-wrapper');
        const form = document.getElementById('formContainer');

        if (!wrapper.classList.contains('open')) {
            wrapper.classList.add('open');
            
            setTimeout(() => {
                form.style.display = 'block';
                setTimeout(() => form.style.opacity = '1', 50);
            }, 1200);
        }
    }

    function checkGuest() {
        const name = document.getElementById('guestName').value.trim();
        const msg = document.getElementById('message');
        
        if (guests[name]) {
            msg.innerHTML = `
                <p style="color: green;">Welcome, <b>${name}</b>! You have <b>${guests[name]}</b> guest slot(s).</p>
                <a href="main.html" class="proceed-btn">Proceed to Details</a>
            `;
        } else {
            msg.innerHTML = `<p style="color: red;">Name not found on guest list.</p>`;
        }
    }
</script>

</body>
</html>
